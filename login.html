<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Přihlášení</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#111b2e;
      --text:#e8eefc;
      --muted:#a9b4d0;
      --primary:#6d5efc;
      --primary2:#22c55e;
      --border:rgba(255,255,255,.10);
      --shadow:0 20px 60px rgba(0,0,0,.35);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(1200px 500px at 20% -10%, rgba(109,94,252,.35), transparent 60%),
        radial-gradient(900px 450px at 90% 0%, rgba(34,197,94,.25), transparent 55%),
        linear-gradient(180deg, var(--bg), #070b14);
      color:var(--text);
      display:flex;
      flex-direction:column;
      min-height:100vh;
    }

    a{color:inherit; text-decoration:none}

    .container{
      width:min(1100px, calc(100% - 32px));
      margin:0 auto;
    }

    /* Top bar */
    header{
      position:sticky;
      top:0;
      z-index:20;
      backdrop-filter: blur(10px);
      background: rgba(11,18,32,.55);
      border-bottom:1px solid var(--border);
    }
    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 0;
      gap:16px;
    }
    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:800;
      letter-spacing:.2px;
    }
    .logo-badge{
      width:34px;height:34px;
      display:grid;place-items:center;
      border-radius:12px;
      background: linear-gradient(135deg, rgba(109,94,252,.95), rgba(34,197,94,.80));
      box-shadow:0 14px 30px rgba(109,94,252,.25);
      border:1px solid rgba(255,255,255,.15);
    }
    .nav a{
      color:var(--muted);
      padding:8px 10px;
      border-radius:12px;
      border:1px solid transparent;
      transition:.2s;
    }
    .nav a:hover{
      color:var(--text);
      border-color: var(--border);
      background: rgba(255,255,255,.04);
    }

    /* Main content */
    main{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 0;
    }

    .auth-container{
      width:100%;
      max-width:420px;
    }

    .auth-card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:40px;
      box-shadow:var(--shadow);
    }

    .auth-card h1{
      margin:0 0 10px 0;
      font-size:28px;
      font-weight:700;
    }

    .auth-card p{
      margin:0 0 30px 0;
      color:var(--muted);
      font-size:14px;
    }

    .form-group{
      margin-bottom:20px;
      display:flex;
      flex-direction:column;
    }

    .form-group label{
      margin-bottom:8px;
      font-size:14px;
      font-weight:500;
      color:var(--text);
    }

    .form-group input{
      padding:12px 14px;
      border:1px solid var(--border);
      border-radius:10px;
      background: rgba(255,255,255,.05);
      color:var(--text);
      font-size:14px;
      font-family:inherit;
      transition:.2s;
    }

    .form-group input:focus{
      outline:none;
      border-color:var(--primary);
      background: rgba(255,255,255,.08);
      box-shadow:0 0 0 3px rgba(109,94,252,.1);
    }

    .form-group input::placeholder{
      color:var(--muted);
    }

    .forgot-password{
      text-align:right;
      margin-bottom:20px;
    }

    .forgot-password a{
      color:var(--primary);
      font-size:14px;
      transition:.2s;
    }

    .forgot-password a:hover{
      color:var(--primary2);
    }

    .submit-btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color:white;
      font-weight:600;
      font-size:14px;
      cursor:pointer;
      transition:.2s;
      box-shadow:0 8px 20px rgba(109,94,252,.3);
    }

    .submit-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 30px rgba(109,94,252,.4);
    }

    .submit-btn:active{
      transform:translateY(0);
    }

    .divider{
      margin:24px 0;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      position:relative;
    }

    .divider::before{
      content:'';
      position:absolute;
      left:0;
      top:50%;
      width:100%;
      height:1px;
      background:var(--border);
      z-index:0;
    }

    .divider span{
      position:relative;
      background:var(--card);
      padding:0 10px;
      z-index:1;
    }

    .social-login{
      display:flex;
      gap:12px;
      margin-bottom:24px;
    }

    .social-btn{
      flex:1;
      padding:10px;
      border:1px solid var(--border);
      border-radius:10px;
      background: rgba(255,255,255,.04);
      color:var(--text);
      font-size:14px;
      cursor:pointer;
      transition:.2s;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
    }

    .social-btn:hover{
      background: rgba(255,255,255,.08);
      border-color:var(--primary);
    }

    .signup-link{
      text-align:center;
      margin-top:20px;
      font-size:14px;
      color:var(--muted);
    }

    .signup-link a{
      color:var(--primary);
      font-weight:600;
      transition:.2s;
    }

    .signup-link a:hover{
      color:var(--primary2);
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <nav class="nav">
        <a href="index.html" class="logo">
          <div class="logo-badge">🔐</div>
          <span>MyApp</span>
        </a>
        <div style="display:flex;gap:16px;">
          <a href="index.html">Domů</a>
          <a href="register.html">Registrace</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <div class="auth-container">
      <div class="auth-card">
        <h1>Přihlášení</h1>
        <p>Přihlaste se do svého účtu</p>

        <form>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="vás@email.com" required>
          </div>

          <div class="form-group">
            <label for="password">Heslo</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
          </div>

          <div class="forgot-password">
            <a href="#forgot">Zapomněli jste heslo?</a>
          </div>

          <button type="submit" class="submit-btn">Přihlásit se</button>
        </form>

        <div class="divider">
          <span>nebo</span>
        </div>

        <div class="social-login">
          <button type="button" class="social-btn">
            <span>🔵</span> Facebook
          </button>
          <button type="button" class="social-btn">
            <span>🔴</span> Google
          </button>
        </div>

        <div class="signup-link">
          Nemáte účet? <a href="register.html">Zaregistrujte se</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    document.querySelector('form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Přihlášení: ' + document.getElementById('email').value);
    });
  </script>
</body>
</html>
